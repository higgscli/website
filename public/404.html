<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#f7f5f1" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#14120f" media="(prefers-color-scheme: dark)">
<title>404 — higgs</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg fill='none' stroke='%236d5bd0' stroke-width='6'%3E%3Cellipse cx='50' cy='50' rx='40' ry='16' transform='rotate(30 50 50)'/%3E%3Cellipse cx='50' cy='50' rx='40' ry='16' transform='rotate(-30 50 50)'/%3E%3C/g%3E%3Ccircle cx='50' cy='50' r='9' fill='%23f7f5f1'/%3E%3C/svg%3E">
<style>
  :root {
    --paper: #f7f5f1;
    --card: #ffffff;
    --line: #e4e0d7;
    --ink: #1f1d1a;
    --muted: #6b6557;
    --term-bg: #16130f;
    --term-text: #ece9e2;
    --accent: #6d5bd0;
    --accent-deep: #5346b0;
    --on-accent: #ffffff;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --serif: "Newsreader", Georgia, serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #14120f;
      --card: #201c17;
      --line: #2e2922;
      --ink: #ece9e2;
      --muted: #948c7c;
      --accent: #a89aff;
      --accent-deep: #8b7cff;
      --on-accent: #14120f;
    }
  }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
         background: var(--paper); color: var(--ink);
         font-family: var(--sans); text-align: center; -webkit-font-smoothing: antialiased; }
  .box { padding: 24px; }
  .code { font-family: var(--mono); color: var(--term-text); background: var(--term-bg);
          border: 1px solid color-mix(in srgb, var(--term-text) 14%, transparent); border-radius: 10px;
          display: inline-block; padding: 10px 14px; font-size: 14px; margin-bottom: 20px; }
  h1 { font-size: 44px; letter-spacing: -0.03em; line-height: 1.05; margin: 0 0 12px; font-weight: 800; }
  h1 em { font-family: var(--serif); font-style: italic; font-weight: 500; }
  p { color: var(--muted); margin: 0 0 28px; font-size: 16px; }
  a { display: inline-block; background: var(--accent); color: var(--on-accent); text-decoration: none;
      padding: 12px 22px; border-radius: 999px; font-weight: 600; font-size: 15px; transition: background .15s; }
  a:hover { background: var(--accent-deep); }
</style>
</head>
<body>
  <div class="box">
    <div class="code">{"error":{"kind":"not_found","code":404}}</div>
    <h1>No such <em>page</em></h1>
    <p>This UID doesn't exist in this mailbox.</p>
    <a href="/">Back to higgscli.com</a>
  </div>
</body>
</html>
